<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>TMT OFFICIAL | Team Telugu Official | 50K Special</title>
    <link rel="canonical" href="https://tmt-official.netlify.app" />
    <meta name="description" content="Official TMT OFFICIAL Gaming Database. Explore 1,300+ Free Fire highlights and pro gameplay clips.">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#050505">
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    
    <style>
        :root { --bg: #050505; --accent: #ff4d00; --card-w: 520px; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; text-decoration: none !important; }
        body { background: radial-gradient(circle at 50% 0%, #2e120b 0%, #050505 100%); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; min-height: 100vh; }
        header { padding: 12px 5%; background: rgba(5,5,5,0.85); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; display: flex; flex-direction: column; gap: 15px; }
        @media (min-width: 768px) { header { flex-direction: row; justify-content: space-between; align-items: center; padding: 15px 8%; } .search-container { max-width: 350px; } }
        .brand-box { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .brand h1 { font-family: 'Syncopate'; font-size: 13px; letter-spacing: 1px; }
        .search-container { position: relative; width: 100%; }
        .search-container input { width: 100%; padding: 14px 15px 14px 45px; border-radius: 14px; border: 1px solid var(--border); background: var(--glass); color: white; outline: none; font-size: 16px; }
        .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #666; }
        main { display: flex; flex-direction: column; align-items: center; padding: 30px 15px; }
        .viewer-box { position: relative; width: 100%; max-width: var(--card-w); min-height: 350px; }
        .card { width: 100%; animation: fadeIn 0.6s ease forwards; cursor: pointer; display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .img-frame { width: 100%; aspect-ratio: 16/9; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); background: #111; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .img-frame img { width: 100%; height: 100%; object-fit: cover; image-rendering: -webkit-optimize-contrast; }
        .v-title { text-align: center; margin-top: 20px; font-weight: 700; font-size: 16px; color: #fff; padding: 0 10px; line-height: 1.4; }
        .click-tag { display: block; text-align: center; color: var(--accent); font-size: 11px; font-weight: 800; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .info-grid { display: grid; grid-template-columns: 1fr; gap: 20px; width: 100%; max-width: 950px; margin: 20px auto; padding: 0 15px; }
        @media (min-width: 900px) { .info-grid { grid-template-columns: 1.8fr 1fr; } }
        .description-section { padding: 35px; border-radius: 28px; background: var(--glass); border: 1px solid var(--border); line-height: 1.6; }
        .description-section h2 { font-family: 'Syncopate'; font-size: 14px; color: var(--accent); margin-bottom: 20px; }
        .stats-box { padding: 40px; border-radius: 28px; background: var(--accent); color: #fff; text-align: center; }
        .socials { display: flex; justify-content: center; gap: 15px; padding: 20px 15px 80px; flex-wrap: wrap; }
        .s-btn { padding: 16px 28px; border-radius: 18px; background: var(--glass); border: 1px solid var(--border); color: #fff; font-weight: 700; transition: 0.3s; }
        .s-btn:hover { background: var(--accent); border-color: var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="brand-box">
        <img src="./logo.png" class="logo-img" alt="TMT Logo">
        <div class="brand"><h1>TMT OFFICIAL</h1></div>
    </div>
    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="searchInput" placeholder="Search 1,300+ videos...">
    </div>
</header>

<main>
    <div id="viewer-box" class="viewer-box"></div>
</main>

<div class="info-grid">
    <section class="description-section">
        <h2>🔥 CHANNEL MISSION</h2>
        <p>Welcome to <b>TMT OFFICIAL</b> – high-energy <b>Free Fire gameplay</b> database. Explore <b>1,300+ videos</b> for our family of <b>50K+ subscribers</b>.</p>
    </section>
    <section class="stats-box">
        <span style="font-family: 'Syncopate'; font-size: 10px; letter-spacing: 2px;">TOTAL VIDEOS</span>
        <span style="font-size:38px; font-weight:900; display:block; margin-top:10px;">1,300+</span>
    </section>
</div>

<div class="socials">
    <a href="https://youtube.com" target="_blank" class="s-btn"><i class="fa-brands fa-youtube"></i> YouTube</a>
    <a href="https://www.instagram.com" target="_blank" class="s-btn"><i class="fa-brands fa-instagram"></i> Instagram</a>
</div>

<script>
    const container = document.getElementById('viewer-box');
    const searchInput = document.getElementById('searchInput');
    let allData = [];
    let currentIdx = 0;

    async function init() {
        try {
            const res = await fetch('./data.csv?v=' + Date.now());
            const text = await res.text();
            
            // Your CSV uses spaces/tabs, not commas. This regex splits by any whitespace.
            allData = text.split('\n').filter(line => line.trim().length > 10).map(line => {
                const parts = line.trim().split(/\s+/);
                const img = parts.pop();    // Filename like 001.webp
                const id = parts.pop();     // YouTube ID
                const title = parts.join(' '); // Remaining text as title
                return { title, id, img };
            });

            if (allData.length > 0) {
                render(0);
                startRotation();
            }
        } catch (err) {
            container.innerHTML = `<p style="text-align:center; color:red;">Check your data.csv or thumbnails folder.</p>`;
        }
    }

    function render(index) {
        const item = allData[index];
        // GitHub shows your folder is named 'thumbnails' (plural)
        const imagePath = `./thumbnails/${item.img}`; 
        
        container.innerHTML = `
            <a href="https://www.youtube.com{item.id}" target="_blank" class="card">
                <div class="img-frame">
                    <img src="${imagePath}" onerror="this.src='./logo.png'" alt="Thumbnail">
                </div>
                <div class="v-title">${item.title}</div>
                <span class="click-tag">Click to Watch Now</span>
            </a>
        `;
    }

    function startRotation() {
        setInterval(() => {
            if (searchInput.value === "") {
                currentIdx = (currentIdx + 1) % allData.length;
                render(currentIdx);
            }
        }, 6000);
    }

    searchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const match = allData.findIndex(item => item.title.toLowerCase().includes(term));
        if (match !== -1) {
            currentIdx = match;
            render(match);
        }
    });

    init();
</script>
</body>
</html>
