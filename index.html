<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>TMT OFFICIAL | 1,300+ Gaming Database</title>
    
    <link rel="canonical" href="https://tmt-official.netlify.app/" />
    <meta name="description" content="Official TMT OFFICIAL Gaming Database. Explore 1,300+ Free Fire highlights, headshots, and pro gameplay clips from TMT Rocky.">
    <meta name="keywords" content="TMT OFFICIAL, TMT Rocky, Free Fire highlights, Gaming Database">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#050505">
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg: #050505; --accent: #ff4d00; --card-w: 520px; 
            --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; text-decoration: none !important; -webkit-tap-highlight-color: transparent; }
        body {
            background: radial-gradient(circle at 50% 0%, #2e120b 0%, #050505 100%);
            color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; min-height: 100vh;
        }
        header {
            padding: 12px 5%; background: rgba(5,5,5,0.85); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
            display: flex; flex-direction: column; gap: 15px;
        }
        @media (min-width: 768px) {
            header { flex-direction: row; justify-content: space-between; align-items: center; padding: 15px 8%; }
            .search-container { max-width: 350px; }
        }
        .brand-box { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .brand h1 { font-family: 'Syncopate'; font-size: 13px; letter-spacing: 1px; }
        .search-container { position: relative; width: 100%; }
        .search-container input {
            width: 100%; padding: 14px 15px 14px 45px; border-radius: 14px;
            border: 1px solid var(--border); background: var(--glass);
            color: white; outline: none; font-size: 16px; 
        }
        .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #666; }
        main { display: flex; flex-direction: column; align-items: center; padding: 30px 15px; }
        .viewer-box { position: relative; width: 100%; max-width: var(--card-w); height: 400px; }
        .card {
            position: absolute; width: 100%; opacity: 0; display: none;
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .card.active { display: block; opacity: 1; z-index: 10; }
        .img-frame { width: 100%; aspect-ratio: 16/9; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); background: #000; }
        .img-frame img { width: 100%; height: 100%; object-fit: cover; }
        .v-title { text-align: center; margin-top: 20px; font-weight: 700; font-size: 18px; color: #fff; padding: 0 10px; min-height: 50px; }
        .click-tag { display: block; text-align: center; color: var(--accent); font-size: 12px; font-weight: 800; margin-top: 10px; text-transform: uppercase; }
        .info-grid { display: grid; grid-template-columns: 1fr; gap: 20px; width: 100%; max-width: 950px; margin: 20px auto; padding: 0 15px; }
        @media (min-width: 900px) { .info-grid { grid-template-columns: 1.8fr 1fr; } }
        .desc-box { padding: 30px; border-radius: 24px; background: var(--glass); border: 1px solid var(--border); }
        .stats-box { padding: 35px; border-radius: 24px; background: var(--accent); color: #fff; text-align: center; }
        .socials { display: flex; justify-content: center; gap: 15px; padding: 20px 15px 80px; flex-wrap: wrap; }
        .s-btn { padding: 16px 25px; border-radius: 16px; background: var(--glass); border: 1px solid var(--border); color: #fff; font-weight: 700; }
        @media (max-width: 500px) { :root { --card-w: 100%; } .viewer-box { height: 350px; } .s-btn { width: 100%; } }
    </style>
</head>
<body>

<header>
    <div class="brand-box">
        <img src="./logo.png" onerror="this.src='https://www.youtube.com/favicon.ico'" class="logo-img">
        <div class="brand"><h1>TMT OFFICIAL</h1></div>
    </div>
    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="searchInput" placeholder="Search 1,300+ clips...">
    </div>
</header>

<main><div class="viewer-box" id="viewer-box"></div></main>

<div class="info-grid">
    <section class="desc-box">
        <h2 style="color:var(--accent); font-family:'Syncopate'; font-size:11px; margin-bottom:12px;">⚡ LIVE ARCHIVE</h2>
        <p style="color:#ccc; font-size: 15px;">Official <span style="color:var(--accent); font-weight:800;">TMT OFFICIAL</span> database. Accessing our high-speed library.</p>
    </section>
    <section class="stats-box">
        <span style="font-size:10px; font-family:'Syncopate';">Total Database</span>
        <span id="vCount" style="font-size:32px; font-weight:900; display:block;">1,300+</span>
    </section>
</div>

<div class="socials">
    <a href="https://youtube.com/@tmt_official-y2x" target="_blank" class="s-btn">YouTube</a>
    <a href="https://www.instagram.com/tmt_rocky_yt" target="_blank" class="s-btn">Instagram</a>
</div>

<script>
    const container = document.getElementById('viewer-box');
    const searchInput = document.getElementById('searchInput');
    const vCount = document.getElementById('vCount');

    let allData = [];
    let filteredData = [];
    let currentIdx = 0;
    let rotationTimer = null;

    async function init() {
        try {
            const res = await fetch('./data.csv?v=' + Date.now());
            const text = await res.text();
            
            allData = text.split('\n').map(l => l.trim()).filter(l => l.length > 5).map(line => {
                const parts = line.split(',');
                return {
                    title: parts.slice(0, -2).join(','), 
                    id: parts[parts.length - 2],
                    img: parts[parts.length - 1]
                };
            });

            vCount.innerText = "1,300+";
            filteredData = [...allData];
            render();
            startRotation();
        } catch (e) { 
            console.error("Data Load Error"); 
            vCount.innerText = "1,300+"; 
        }
    }

    function render() {
        container.innerHTML = '';
        if(filteredData.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:50px;color:#444;">No clips found...</div>';
            return;
        }
        filteredData.forEach((v, i) => {
            const card = document.createElement('div');
            card.className = `card ${i===currentIdx?'active':''}`;
            card.style.display = i===currentIdx ? 'block' : 'none';
            
            // SEO-Optimized Image Loading
            // Tries local thumbnail folder -> Tries root folder -> Tries YouTube
            card.innerHTML = `
                <a href="https://youtube.com/watch?v=${v.id}" target="_blank">
                    <div class="img-frame">
                        <img src="./thumbnail/${v.img}" 
                             loading="lazy" 
                             alt="${v.title}"
                             onerror="this.onerror=null; this.src='./${v.img}'; this.addEventListener('error', function(){ this.src='https://img.youtube.com/vi/${v.id}/mqdefault.jpg' });">
                    </div>
                    <div class="v-title">${v.title}</div>
                    <span class="click-tag">⚡ Click to Watch</span>
                </a>`;
            container.appendChild(card);
        });
    }

    function rotate() {
        const cards = document.querySelectorAll('.card');
        if (cards.length <= 1) return;
        cards[currentIdx].classList.remove('active');
        cards[currentIdx].style.display = 'none';
        currentIdx = (currentIdx + 1) % cards.length;
        cards[currentIdx].style.display = 'block';
        setTimeout(() => cards[currentIdx].classList.add('active'), 50);
    }

    function startRotation() {
        if (rotationTimer) clearInterval(rotationTimer);
        if (filteredData.length > 1) rotationTimer = setInterval(rotate, 2800);
    }

    searchInput.addEventListener('input', e => {
        const term = e.target.value.toLowerCase();
        filteredData = allData.filter(v => v.title.toLowerCase().includes(term));
        currentIdx = 0;
        render();
        startRotation();
    });

    window.onload = init;
</script>
</body>
</html>
